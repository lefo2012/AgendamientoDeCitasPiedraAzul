<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clínica Piedra Azul</title>

<style>
:root {
  --azul: #96C2DB;
  --azul-claro: #E5EDF1;
  --azul-oscuro: #2F4858;

  --fondo: #E5EDF1;
  --blanco: #FFFFFF;
  --texto: #3A4A54;

  --verde: #7FB77E;
}

/* BASE */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--fondo);
  color: var(--texto);
  font-size: 18px;
}

/* HEADER (más fuerte) */
header {
  background: var(--azul-oscuro);
  color: white;
  padding: 20px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: bold;
  font-size: 22px;
}

/* NAV */
nav a {
  margin-left: 20px;
  text-decoration: none;
  color: white;
  font-weight: 600;
}

/* HERO */
.hero {
  background: var(--azul);
  color: var(--azul-oscuro);
  padding: 50px 20px;
  text-align: center;
}

.hero h1 {
  margin-bottom: 10px;
}

/* CONTENIDO */
.container {
  max-width: 900px;
  margin: -30px auto 40px; /* efecto overlay */
  padding: 0 20px;
}

/* TARJETA */
.card {
  background: var(--blanco);
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* BOTÓN */
.btn {
  display: inline-block;
  padding: 14px 26px;
  background: var(--azul-oscuro);
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  margin-top: 10px;
}

.btn:hover {
  background: #1f3644;
}

/* INFO */
.info {
  background: var(--azul-claro);
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;
}

/* STATUS */
.status {
  display: inline-block;
  margin-top: 15px;
  padding: 8px 14px;
  border-radius: 20px;
  background: var(--verde);
  color: white;
  font-size: 14px;
}

/* FOOTER */
footer {
  background: var(--azul-oscuro);
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Piedra Azul</div>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Citas</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<!-- HERO con color -->
<section class="hero">
  <h1>Clínica Piedra Azul</h1>
  <p>Atención médica clara, rápida y confiable</p>
</section>

<div class="container">

  <div class="card">
    <h2>Agendar cita médica</h2>
    <p>Seleccione el día y la hora fácilmente.</p>

    <a href="#" class="btn">Agendar cita</a>

    <div class="info">
      Atención de lunes a viernes de 8:00am a 5:00pm.
    </div>

    <div class="status">
      Sistema disponible
    </div>
  </div>

</div>

<footer>
  Clínica Piedra Azul · Tel: 123456789
</footer>

</body>
</html>
