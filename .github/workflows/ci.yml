name: ci

on:
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BackendPiedraAzul
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: ./mvnw -B test

  frontend-piedraazul-tests:
    name: Frontend PiedraAzul (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontendPiedraAzul
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FrontendPiedraAzul/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build

  frontend-medicos-tests:
    name: Frontend Medicos (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontEndMedicos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FrontEndMedicos/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build
