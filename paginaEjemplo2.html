<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clínica Piedra Azul</title>

<style>
:root {
  --fondo: #EFFAFD;
  --azul: #4A8BDF;
  --berenjena: #A0006D;
  --blanco: #FFFFFF;
  --texto: #2D2D2D;
}

/* BASE */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--fondo);
  color: var(--texto);
  font-size: 18px;
}

/* HEADER */
header {
  background: var(--azul);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 24px;
}

/* NAV */
nav {
  background: #3A78C2;
  padding: 15px;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

/* CONTENIDO */
.container {
  padding: 20px;
}

/* TARJETAS */
.card {
  background: var(--blanco);
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* BOTÓN PRINCIPAL */
.btn {
  display: inline-block;
  padding: 15px 25px;
  background: var(--azul);
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}

/* BOTÓN SECUNDARIO (berenjena) */
.btn-secondary {
  display: inline-block;
  padding: 15px 25px;
  background: var(--berenjena);
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  margin-left: 10px;
}

/* BLOQUE DESTACADO */
.highlight {
  background: #FCE4F1;
  border-left: 6px solid var(--berenjena);
  padding: 15px;
  margin-top: 10px;
  border-radius: 6px;
}

/* FOOTER */
footer {
  background: var(--azul);
  color: white;
  text-align: center;
  padding: 15px;
}
</style>
</head>

<body>

<header>
  Clínica Piedra Azul
</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Citas</a>
  <a href="#">Servicios</a>
  <a href="#">Contacto</a>
</nav>

<div class="container">

  <!-- TARJETA PRINCIPAL -->
  <div class="card">
    <h2>Agendar cita</h2>
    <p>Seleccione el día y la hora de forma sencilla.</p>

    <a href="#" class="btn">Agendar</a>
    <a href="#" class="btn-secondary">Cancelar</a>
  </div>

  <!-- BLOQUE DESTACADO -->
  <div class="card">
    <h2>Información importante</h2>

    <div class="highlight">
      Recuerde traer su documento de identidad el día de su cita.
    </div>
  </div>

</div>

<footer>
  Tel: 123456789 | Clínica Piedra Azul
</footer>

</body>
</html>
