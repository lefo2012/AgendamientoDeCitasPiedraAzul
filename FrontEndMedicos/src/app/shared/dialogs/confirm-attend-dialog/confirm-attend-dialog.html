<div class="attend-dialog">
  <div class="attend-header">
    <mat-icon class="attend-icon">check</mat-icon>
    <h2 mat-dialog-title class="attend-title">Confirmar Asistencia</h2>
  </div>
  <mat-dialog-content>
    <mat-divider></mat-divider>
    <p class="attend-message">¿Deseas confirmar la asistencia a la siguiente cita?</p>
    <div *ngIf="data.appointment" class="appointment-details">
      <div class="detail-row">
        <span class="detail-label">Doctor:</span>
        <span class="detail-value">{{ data.appointment.doctorName }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Paciente:</span>
        <span class="detail-value">{{ data.appointment.patientName }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Fecha:</span>
        <span class="detail-value">{{ data.appointment.date }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Horario:</span>
        <span class="detail-value">{{ data.appointment.appointmentInterval }}</span>
      </div>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancelar</button>
    <button mat-flat-button color="primary" (click)="onConfirm()">
      <mat-icon>check</mat-icon>
      Confirmar Asistencia
    </button>
  </mat-dialog-actions>
</div>
