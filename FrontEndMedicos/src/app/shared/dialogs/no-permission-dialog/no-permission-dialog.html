<div class="no-permission-dialog">
  <div class="no-permission-header">
    <mat-icon class="no-permission-icon">lock</mat-icon>
    <h2 mat-dialog-title class="no-permission-title">Acceso restringido</h2>
  </div>

  <mat-dialog-content>
    <mat-divider></mat-divider>
    <p class="no-permission-message">{{ message }}</p>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-flat-button color="primary" (click)="close()">Cerrar</button>
  </mat-dialog-actions>
</div>
