<section class="auth-page login-page">
  <div class="auth-card login-card shadow">
    <header class="auth-header">
      <p class="auth-kicker">Bienvenido</p>
      <h1>Iniciar sesion</h1>
      <p class="auth-subtitle">Accede para gestionar las citas de la clinica.</p>
    </header>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="field-block">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario o correo</mat-label>
          <input matInput type="text" formControlName="email" placeholder="usuario@correo.com" autocomplete="username" />
          @if (fieldInvalid('email')) {
            <mat-error>Ingresa un usuario o correo valido.</mat-error>
          }
        </mat-form-field>
      </div>

      <div class="field-block">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contrasena</mat-label>
          <input matInput type="password" formControlName="password" placeholder="********" autocomplete="current-password" />
          @if (fieldInvalid('password')) {
            <mat-error>La contrasena es obligatoria.</mat-error>
          }
        </mat-form-field>
      </div>

      @if (errorMessage) {
        <div class="form-alert" role="alert">{{ errorMessage }}</div>
      }

      <button mat-flat-button class="auth-submit" type="submit">Ingresar</button>
    </form>
  </div>
</section>
