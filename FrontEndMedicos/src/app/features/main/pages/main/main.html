<section class="welcome-section">
  <div class="welcome-image">
    <img src="/clinic-welcome.jpg" alt="Clinica Piedra Azul" class="clinic-image" />
  </div>
  <div class="welcome-card">
    <div class="welcome-content">
      <h1>Portal Medico</h1>
      <p>
        Gestiona tus atenciones de forma rapida. Desde aqui puedes registrar y organizar
        las citas de tus pacientes en un solo lugar.
      </p>
    </div>
  </div>
</section>

<div class="card-container" id="appointments-options">
  <div
    class="card card-left"
    role="button"
    tabindex="0"
    aria-label="Agendar una cita"
    (click)="goToCreateAppointment()"
    (keydown.enter)="goToCreateAppointment()"
    (keydown.space)="goToCreateAppointment()"
  >
    <div class="face-card">
      <img src="/tiempo-del-calendario.png" class="img" alt="Agendar cita" />
      <img src="/tiempo-del-calendario.gif" class="gif" alt="Agendar cita" />
      <h1>Agenda una cita</h1>
    </div>
  </div>
</div>
