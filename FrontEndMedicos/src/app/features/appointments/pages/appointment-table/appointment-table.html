<section class="appointment-table">
  <h2>Agenda de Citas</h2>
  <table>
    <thead>
      <tr>
        <th>Doctor</th>
        <th>Fecha</th>
        <th>Intervalo</th>
        <th>Paciente</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of appointments">
        <td>{{ item.doctor }}</td>
        <td>{{ item.date }}</td>
        <td>{{ item.timeRange }}</td>
        <td>{{ item.patient }}</td>
      </tr>
    </tbody>
  </table>
</section>
