<section class="appointment-table mat-elevation-z2">
  <h2>Reporte de Citas</h2>
  <p>Filtra las citas por doctor o fecha</p>

  <div class="filters">
    <mat-form-field appearance="fill" class="filter-field">
      <mat-label>Doctor</mat-label>
      <mat-select [(ngModel)]="selectedDoctorId" [ngModelOptions]="{ standalone: true }" (selectionChange)="onDoctorFilterChange()">
        <mat-option [value]="null">Todos</mat-option>
        <mat-option *ngFor="let doctor of doctors" [value]="doctor.id">{{ doctor.firstName }} {{ doctor.lastName }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill" class="filter-field">
      <mat-label>Fecha</mat-label>
      <input #dateInputRef matInput [matDatepicker]="picker" readonly="readonly" [(ngModel)]="selectedAppointmentDate" [ngModelOptions]="{ standalone: true }" (dateChange)="onDateFilterChange($event, picker)">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <div class="filter-buttons">
      <button mat-stroked-button color="accent" type="button" (click)="showAppointmentsForToday()">
        <mat-icon>today</mat-icon>
        Mostrar citas hoy
      </button>
      <button mat-stroked-button color="accent" type="button" (click)="resetFilters()">
        <mat-icon>refresh</mat-icon>
        Mostrar todos
      </button>
    </div>
  </div>

  <table mat-table [dataSource]="appointments" *ngIf="showResults" class="mat-elevation-z1" >

    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef>Seleccionar</th>
      <td mat-cell *matCellDef="let element">
    <mat-checkbox 
  [checked]="selectedAppointmentId === element.id" 
  (click)="toggleSelection(element)"
  aria-label="Seleccionar cita">
</mat-checkbox>
      </td>
    </ng-container>

    <ng-container matColumnDef="doctorName">
      <th mat-header-cell *matHeaderCellDef>Doctor</th>
      <td mat-cell *matCellDef="let element">{{ element.doctorName }}</td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let element">{{ element.date }}</td>
    </ng-container>

    <ng-container matColumnDef="appointmentInterval">
      <th mat-header-cell *matHeaderCellDef>Horario</th>
      <td mat-cell *matCellDef="let element">{{ element.appointmentInterval }}</td>
    </ng-container>

    <ng-container matColumnDef="patientName">
      <th mat-header-cell *matHeaderCellDef>Paciente</th>
      <td mat-cell *matCellDef="let element">{{ element.patientName }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
   <tr
  mat-row
  *matRowDef="let row; columns: displayedColumns;"
  class="table-row"
  [class.is-selected]="selectedAppointmentId === row.id"
></tr>
  </table>

</section>
<footer>
  <app-appointment-buttons
    [exportDisabled]="appointments.length === 0"
    (exportRequested)="exportCurrentResultsToCsv()"
    [cancelDisabled]="selectedAppointmentId == null"
    (cancelRequested)="cancelAppointment()"
  ></app-appointment-buttons>
  
</footer>
