<section class="appointment-table">
  <h2>Agenda de Citas</h2>

  <!-- FILTROS -->
  <div class="filters">
    <label>Doctor:</label>
    <select [(ngModel)]="selectedDoctorId">
      <option [ngValue]="null">Todos los doctores</option>
      <option *ngFor="let doc of doctors" [ngValue]="doc.id">
        {{ doc.firstName }} {{ doc.lastName }}
      </option>
    </select>

    <label>Fecha:</label>
    <input type="date" [(ngModel)]="selectedDate" />

    <button (click)="searchAppointments()">Buscar</button>
    <button (click)="resetFilters()">Mostrar todas</button>
  </div>

  <!-- Loading -->
  <p *ngIf="isLoading">Cargando citas...</p>

  <!-- TABLA -->
  <table *ngIf="!isLoading && appointments.length > 0">
    <thead>
      <tr>
        <th>Doctor</th>
        <th>Fecha</th>
        <th>Intervalo</th>
        <th>Paciente</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of appointments">
        <td>{{ item.doctor }}</td>
        <td>{{ item.date }}</td>
        <td>{{ item.timeRange }}</td>
        <td>{{ item.patient }}</td>
      </tr>
    </tbody>
  </table>

  <!-- Sin resultados -->
  <p *ngIf="!isLoading && appointments.length === 0">No hay citas para los filtros seleccionados.</p>
</section>

<app-appointment-buttons></app-appointment-buttons>
