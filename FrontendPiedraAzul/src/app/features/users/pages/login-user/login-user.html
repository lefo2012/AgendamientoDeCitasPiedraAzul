<section class="auth-page login-page">
  <div class="auth-card login-card shadow">
    <header class="auth-header">
      <p class="auth-kicker">Bienvenido</p>
      <h1>Iniciar sesion</h1>
      <p class="auth-subtitle">Accede para gestionar tus citas de forma rapida y segura.</p>
    </header>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="field-block">
        <label class="form-label" for="loginEmail">Usuario o correo</label>
        <input
          id="loginEmail"
          type="text"
          class="form-control"
          [class.is-invalid]="fieldInvalid('email')"
          formControlName="email"
          placeholder="Nombre de usuario o correo electrónico"
          autocomplete="username"
        >
        @if (fieldInvalid('email')) {
          <small class="field-error">Ingresa un usuario o correo válido.</small>
        }
      </div>

      <div class="field-block">
        <label class="form-label" for="loginPassword">Contraseña</label>
        <input
          id="loginPassword"
          type="password"
          class="form-control"
          [class.is-invalid]="fieldInvalid('password')"
          formControlName="password"
          placeholder="********"
          autocomplete="current-password"
        >
        @if (fieldInvalid('password')) {
          <small class="field-error">La contraseña es obligatoria.</small>
        }
      </div>

      @if (errorMessage) {
        <div class="form-alert" role="alert">{{ errorMessage }}</div>
      }

      <button class="btn btn-primary w-100 auth-submit" type="submit">
        Ingresar
      </button>
    </form>
  </div>
</section>
